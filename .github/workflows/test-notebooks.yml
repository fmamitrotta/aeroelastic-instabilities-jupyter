name: Test Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 06:00 UTC to catch upstream dependency breakage
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbval pytest

      - name: Test notebooks execute without errors
        run: |
          pytest --nbval-lax notebooks/00_Python_and_Jupyter_Intro.ipynb
          pytest --nbval-lax notebooks/01_Aeroelastic_Polar_and_Torsional_Divergence.ipynb
          pytest --nbval-lax notebooks/02_Quasi_Steady_Aerodynamics_and_the_Heave_Model.ipynb
          pytest --nbval-lax notebooks/03_Flutter_of_the_Heave-Pitch_Typical_Section_with_Quasi-Steady_Aerodynamics.ipynb
          pytest --nbval-lax notebooks/Take-Home_Assignment_Linear_Aeroelastic_Galloping.ipynb
